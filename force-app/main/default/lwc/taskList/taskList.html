<template>
  <table class="slds-table slds-table_bordered">
    <thead>
      <tr>
        <th>Задача</th>
        <th>Действие</th>
      </tr>
    </thead>
    <tbody>
      <template lwc:if={tasks}>
        <template for:each={tasks} for:item="task">
          <tr key={task.Id}>
            <td class={task.style}>{task.Subject__c}</td>
            <td>
              <button  onclick={completeTask} data-id={task.Id}>Выполнено</button>
            </td>
          </tr>
        </template>
      </template>
    </tbody>
  </table>
</template>
